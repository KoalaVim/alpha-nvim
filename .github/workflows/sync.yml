name: Sync
on:
  schedule:
    - cron: '0 0 * * 0'
  workflow_dispatch:

jobs:
  run-sync:
    uses: KoalaVim/actions-internal/.github/workflows/rebase-plugin.yml@feat/ai-conflict-resolution
    with:
      upstream_repo: "goolord/alpha-nvim"
      plugin_name: "alpha-nvim"
      tracking_issue_number: "93"
    secrets:
      KOALA_APP_ID: ${{ secrets.KOALA_APP_ID }}
      KOALA_APP_PRIVATE_KEY: ${{ secrets.KOALA_APP_PRIVATE_KEY }}
